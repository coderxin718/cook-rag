version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: cook-rag-redis
    volumes:
      - ./redis_data:/data
    command: redis-server --appendonly yes --save 900 1 --save 300 10
    restart: unless-stopped

  cook-rag:
    build: .
    container_name: cook-rag
    # 暴露端口到宿主机，通过端口区分不同服务
    ports:
      - "8899:8899"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./data:/app/data
      - ./code/vector_index:/app/code/vector_index
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cook-rag-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - cook-rag
    restart: unless-stopped
